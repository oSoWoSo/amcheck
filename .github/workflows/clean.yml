name: "clean: History"

on:
  repository_dispatch:
    types: [clean]

  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  actions: write
  contents: write

env:
  REPO: ${{ github.repository_owner }}/AM
  BRANCH: main-clean

jobs:
  clean-history:
    name: "Clean history"
    runs-on: ubuntu-22.04
    steps:
      - name: "Checkout AM"
        uses: actions/checkout@v4
        with:
          repository: ${{ env.REPO }}
          ref: main
          fetch-depth: 0
          token: ${{ secrets.TOKEN }}

      - name: "Prepare branch"
        run: |
          git config user.name "${{ github.repository_owner }}"
          git config user.email "noreply@github.com"
          if git ls-remote --exit-code --heads origin "${{ env.BRANCH }}"; then
            git fetch origin "${{ env.BRANCH }}"
            git checkout "${{ env.BRANCH }}"
          else
            git checkout -b "${{ env.BRANCH }}"
          fi
          git rebase origin/main || (git rebase --abort && echo "Rebase failed, keeping previous state")

      - name: "Clean empty merge commits"
        run: |
          git filter-branch -f --commit-filter '
            if git show -s --format=%P $GIT_COMMIT | grep -q " "; then
              skip_commit "$@";
            else
              git commit-tree "$@";
            fi' HEAD || echo "No commits modified"

      - name: "Push changes"
        run: |
          if ! git diff --quiet; then
            git push --force origin HEAD:"${{ env.BRANCH }}"
          else
            echo "No changes to push"
          fi
